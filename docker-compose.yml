services:
  postgres:
    image: postgres:16-alpine
    container_name: nursery-portal-db
    environment:
      POSTGRES_DB: nursery_portal
      POSTGRES_USER: nursery
      POSTGRES_PASSWORD: nursery_dev
    ports:
      - "5432:5432"
    volumes:
      - .pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nursery -d nursery_portal"]
      interval: 5s
      timeout: 5s
      retries: 5
