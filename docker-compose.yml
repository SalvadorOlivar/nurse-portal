services:
  postgres:
    image: postgres:16-alpine
    container_name: nurse-portal-db
    environment:
      POSTGRES_DB: nurse_portal
      POSTGRES_USER: nurse
      POSTGRES_PASSWORD: nurse_dev
    ports:
      - "5432:5432"
    volumes:
      - .pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurse -d nurse_portal"]
      interval: 5s
      timeout: 5s
      retries: 5
